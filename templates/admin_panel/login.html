{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In — AcadConnect</title>
  <meta name="description" content="Administrator login for AcadConnect.">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/features.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet">
  <link rel="icon" href="{% static 'images/gra.png' %}">
</head>

<body>

<div class="auth-page" style="min-height:100vh;">
  <div class="auth-card" style="max-width:400px;">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-brand-icon"
        style="background:linear-gradient(135deg,var(--accent-coral),var(--accent-gold));box-shadow:0 8px 28px rgba(255,100,80,.35);">
        <i class="ph ph-shield-check"></i>
      </div>
      <h1 class="auth-title">Admin Panel</h1>
      <p class="auth-sub">Restricted access — administrators only</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %} mb-12">
      <i class="ph ph-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}x-circle{% else %}info{% endif %}"></i>
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="post" id="admin-login-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="admin-username">Username</label>
        <input type="text" name="username" id="admin-username" class="form-control"
          placeholder="Admin username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="admin-password">Password</label>
        <input type="password" name="password" id="admin-password" class="form-control"
          placeholder="Admin password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-100" id="admin-login-btn"
        style="justify-content:center;background:linear-gradient(135deg,var(--accent-coral),var(--accent-gold));border:none;margin-top:8px;">
        <i class="ph ph-shield-check"></i> Sign In as Admin
      </button>
    </form>

    <p class="text-center mt-16" style="font-size:0.8rem;color:var(--text-muted);">
      Not an admin? <a href="{% url 'accounts:login' %}">Go to student login →</a>
    </p>

  </div>
</div>

</body>
</html>
