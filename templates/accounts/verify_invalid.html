{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invalid Link — AcadConnect</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/features.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="icon" href="{% static 'images/gra.png' %}">
</head>
<body>
<canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;position:relative;z-index:1;">
  <div style="width:100%;max-width:440px;text-align:center;">

    <div class="auth-card">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#E07A5F,#E9C46A);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 22px;box-shadow:0 8px 28px rgba(224,122,95,.35);">
        <i class="ph ph-warning-octagon" style="color:white;"></i>
      </div>

      <h1 style="font-family:var(--font-heading);font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;color:var(--accent-coral);">
        Link Expired or Invalid
      </h1>
      <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.7;margin-bottom:28px;">
        This verification link is either <strong>expired</strong> or has already been used.
        Verification links are valid for <strong>24 hours</strong>.
      </p>

      <div style="display:flex;flex-direction:column;gap:10px;">
        <a href="{% url 'accounts:register' %}" class="btn btn-primary" style="justify-content:center;">
          <i class="ph ph-user-plus"></i> Register Again
        </a>
        <a href="{% url 'accounts:login' %}" class="btn btn-secondary" style="justify-content:center;">
          <i class="ph ph-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  function wave(y, amplitude, period, phase, color) {
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let x = 0; x <= W; x++) ctx.lineTo(x, y + Math.sin((x/period)+phase+t)*amplitude);
    ctx.lineTo(W, H); ctx.closePath(); ctx.fillStyle = color; ctx.fill();
  }
  function loop() {
    ctx.clearRect(0,0,W,H);
    wave(H*.55,40,W*.4,0,'rgba(224,122,95,.18)');
    wave(H*.62,30,W*.35,1.2,'rgba(233,196,106,.15)');
    wave(H*.70,22,W*.45,2.1,'rgba(168,218,220,.1)');
    t+=.008; requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
