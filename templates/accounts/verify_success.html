{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Verified — AcadConnect</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/features.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="icon" href="{% static 'images/gra.png' %}">
</head>
<body>
<canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;position:relative;z-index:1;">
  <div style="width:100%;max-width:440px;text-align:center;">

    <div class="auth-card">
      <!-- Success animation -->
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#52B788,#A8DADC);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 22px;box-shadow:0 8px 28px rgba(82,183,136,.35);animation:pop .5s cubic-bezier(.34,1.56,.64,1);">
        <i class="ph ph-check-circle" style="color:white;"></i>
      </div>

      <h1 style="font-family:var(--font-heading);font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;color:var(--accent-green);">
        Account Verified!
      </h1>
      <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.7;margin-bottom:28px;">
        {% if user %}Hi <strong style="color:var(--text-primary);">{{ user.first_name|default:user.username }}</strong>,{% endif %}
        your email has been verified and your AcadConnect account is now active. 🎓
      </p>

      <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100" style="justify-content:center;font-size:.95rem;padding:13px;">
        <i class="ph ph-sign-in"></i> Sign In to Your Account
      </a>
    </div>

  </div>
</div>

<style>
@keyframes pop {
  0%   { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}
</style>

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  function wave(y, amplitude, period, phase, color) {
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let x = 0; x <= W; x++) ctx.lineTo(x, y + Math.sin((x/period)+phase+t)*amplitude);
    ctx.lineTo(W, H); ctx.closePath(); ctx.fillStyle = color; ctx.fill();
  }
  function loop() {
    ctx.clearRect(0,0,W,H);
    wave(H*.55,40,W*.4,0,'rgba(82,183,136,.2)');
    wave(H*.62,30,W*.35,1.2,'rgba(168,218,220,.18)');
    wave(H*.70,22,W*.45,2.1,'rgba(42,157,143,.12)');
    t+=.007; requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
